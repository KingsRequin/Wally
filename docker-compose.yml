networks:
  wally-net:
    driver: bridge

services:
  qdrant:
    image: qdrant/qdrant:v1.13.3
    container_name: wally-qdrant
    networks:
      - wally-net
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' && echo OK || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: wally-neo4j
    networks:
      - wally-net
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
    volumes:
      - ./data/neo4j:/data
    ports:
      - "${NEO4J_BROWSER_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  init-perms:
    image: alpine:3.19
    container_name: wally-init-perms
    user: "0:0"
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./.env:/dotenv
      - ./config.yaml:/config.yaml
    command: sh -c "chown -R 1000:1000 /data /logs && chown -R 7474:7474 /data/neo4j && chmod -R 775 /data /logs && chown 1000:1000 /dotenv /config.yaml"
    restart: "no"

  wally:
    build:
      context: .
      args:
        GIT_HASH: ${GIT_HASH:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: wally-bot
    user: "1000:1000"
    group_add:
      - "996"
    networks:
      - wally-net
    depends_on:
      init-perms:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      - TZ=Europe/Paris
    env_file: .env
    ports:
      - "0.0.0.0:8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
      - ./bot/persona:/app/bot/persona
      - ./public-ui:/app/public-ui
      - ./.env:/app/.env
      - ./ROADMAP.md:/app/ROADMAP.md:ro
      - ./bot/dashboard/static:/app/bot/dashboard/static:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/stacks/wally-instances:/opt/stacks/wally-instances
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins/docker-compose:/usr/libexec/docker/cli-plugins/docker-compose:ro
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: wally-cloudflared
    command: tunnel --no-autoupdate run
    networks:
      - wally-net
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_WALLY_TOKEN}
    depends_on:
      - wally
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--no-autoupdate", "info"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
