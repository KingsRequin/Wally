networks:
  wally-net:
    driver: bridge
  firecrawl-shared:
    external: true

services:
  init-perms:
    image: alpine:3.19
    container_name: wally-init-perms
    user: "0:0"
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./bot/persona:/persona
      - ./.env:/dotenv
      - ./config.yaml:/config.yaml
    command: sh -c "chown -R 1000:1000 /data /logs /persona && chmod -R 775 /data /logs && chown 1000:1000 /dotenv /config.yaml"
    restart: "no"

  wally:
    build:
      context: .
      args:
        GIT_HASH: ${GIT_HASH:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: wally-bot
    user: "1000:1000"
    group_add:
      - "996"
    networks:
      - wally-net
      - firecrawl-shared
    depends_on:
      init-perms:
        condition: service_completed_successfully
    environment:
      - TZ=Europe/Paris
      - HF_HOME=/app/data/hf-cache   # cache modèle faster-whisper dans le volume persistant ./data (évite le re-download à chaque restart)
    env_file: .env
    ports:
      - "0.0.0.0:8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
      - ./bot/persona:/app/bot/persona
      - ./bot/intelligence/persona/CHANNELS.md:/app/bot/intelligence/persona/CHANNELS.md
      - ./public-ui:/app/public-ui:ro
      - ./.env:/app/.env
      - ./bot/dashboard/static:/app/bot/dashboard/static:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/stacks/wally-instances:/opt/stacks/wally-instances
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins/docker-compose:/usr/libexec/docker/cli-plugins/docker-compose:ro
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: wally-cloudflared
    command: tunnel --no-autoupdate run
    networks:
      - wally-net
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_WALLY_TOKEN}
    depends_on:
      - wally
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--no-autoupdate", "info"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
