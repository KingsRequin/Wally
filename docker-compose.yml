networks:
  wally-net:
    driver: bridge

services:
  qdrant:
    image: qdrant/qdrant:v1.13.3
    container_name: wally-qdrant
    networks:
      - wally-net
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' && echo OK || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  init-perms:
    image: alpine:3.19
    container_name: wally-init-perms
    user: "0:0"
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./.env:/dotenv
      - ./config.yaml:/config.yaml
    command: sh -c "chown -R 1000:1000 /data /logs && chmod -R 775 /data /logs && chown 1000:1000 /dotenv /config.yaml"
    restart: "no"

  wally:
    build: .
    container_name: wally-bot
    user: "1000:1000"
    group_add:
      - "996"
    networks:
      - wally-net
    depends_on:
      init-perms:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
    environment:
      - TZ=Europe/Paris
    env_file: .env
    ports:
      - "0.0.0.0:8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
      - ./.env:/app/.env
      - ./ROADMAP.md:/app/ROADMAP.md:ro
      - ./bot/dashboard/static:/app/bot/dashboard/static:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/stacks/wally-instances:/opt/stacks/wally-instances
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: wally-cloudflared
    command: tunnel --no-autoupdate run
    networks:
      - wally-net
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_WALLY_TOKEN}
    depends_on:
      - wally
    restart: unless-stopped
