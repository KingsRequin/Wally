networks:
  wally-net:
    driver: bridge

services:
  qdrant:
    image: qdrant/qdrant:v1.13.3
    container_name: wally-qdrant
    networks:
      - wally-net
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' && echo OK || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  wally:
    build: .
    container_name: wally-bot
    networks:
      - wally-net
    depends_on:
      qdrant:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
    restart: unless-stopped
