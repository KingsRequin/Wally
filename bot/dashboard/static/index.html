<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Wally Dashboard</title>
  <script src="https://cdn.tailwindcss.com?plugins=container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=6">
  <link rel="icon" id="favicon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23888888' stroke='white' stroke-width='2'/></svg>">
</head>
<body>

<div class="app-wrapper">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">W <span style="color:var(--text-muted);font-size:12px;font-weight:400;margin-left:6px;">Admin</span></div>

    <nav class="sidebar-nav" id="nav-admin">
      <a class="sidebar-item active" data-tab="admin-parametres" onclick="showTab('admin-parametres')" href="javascript:void(0)" aria-label="Paramètres">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <span>Paramètres</span>
      </a>
      <a class="sidebar-item" data-tab="admin-memoire" onclick="showTab('admin-memoire')" href="javascript:void(0)" aria-label="Mémoire">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/></svg>
        <span>Mémoire</span>
        <span id="links-badge" class="sidebar-badge" style="display:none">0</span>
      </a>
      <a class="sidebar-item" data-tab="admin-actions" onclick="showTab('admin-actions')" href="javascript:void(0)" aria-label="Actions">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        <span>Actions</span>
      </a>
      <a class="sidebar-item" data-tab="admin-prompts" onclick="showTab('admin-prompts')" href="javascript:void(0)" aria-label="Prompts">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        <span>Prompts</span>
      </a>
      <a class="sidebar-item" data-tab="admin-systeme" onclick="showTab('admin-systeme')" href="javascript:void(0)" aria-label="Système">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        <span>Système</span>
      </a>
    </nav>

    <div class="sidebar-spacer"></div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Admin Control Bar -->
    <div class="control-bar" id="control-bar" style="display:none">
      <div class="control-bar-group">
        <div class="control-bar-indicator">
          <span class="control-bar-dot" id="discord-dot"></span>
          <span class="control-bar-label">Discord</span>
          <button class="control-bar-btn" id="discord-toggle-btn" onclick="toggleBotAdapter('discord')">Stop</button>
        </div>
        <div class="control-bar-indicator">
          <span class="control-bar-dot" id="twitch-dot"></span>
          <span class="control-bar-label">Twitch</span>
          <button class="control-bar-btn" id="twitch-toggle-btn" onclick="toggleBotAdapter('twitch')">Stop</button>
        </div>
      </div>
      <div class="control-bar-group" id="update-group" style="display:none">
        <button class="control-bar-btn update" id="update-available-btn" onclick="triggerSelfUpdate()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v6m0 0l3-3m-3 3L9 5M12 22v-6m0 0l3 3m-3-3l-3 3M2 12h6m0 0L5 9m3 3l-3 3M22 12h-6m0 0l3-3m-3 3l3 3"/></svg>
          Update dispo
        </button>
      </div>
      <div class="control-bar-group">
        <span id="version-badge" style="font-size:11px;color:var(--text-muted);font-family:monospace;letter-spacing:0.02em"></span>
      </div>
      <div class="control-bar-group">
        <button class="control-bar-btn restart" id="restart-btn" onclick="restartContainer()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          Restart
        </button>
      </div>
    </div>

    <!-- ADMIN PARAMETRES TAB (Émotions · LLM · Images) -->
    <div class="tab-content active" id="tab-admin-parametres"></div>

    <!-- ADMIN MEMOIRE TAB -->
    <div class="tab-content" id="tab-admin-memoire"></div>

    <!-- ADMIN COSTS TAB (content rendered dynamically by renderCostsTab()) -->

    <!-- ADMIN ACTIONS TAB -->
    <div class="tab-content" id="tab-admin-actions"></div>

    <!-- ADMIN PROMPTS TAB -->
    <div class="tab-content" id="tab-admin-prompts"></div>

    <!-- ADMIN SYSTEME TAB (Logs · Twitch · Overlay · Instances) -->
    <div class="tab-content" id="tab-admin-systeme"></div>

  </main>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="auth-modal" role="dialog" aria-modal="true" aria-label="Connexion admin">
  <div class="modal">
    <h2>ACCES ADMIN</h2>
    <div class="field-group">
      <label class="field-label" for="token-input">Dashboard Token</label>
      <input type="password" id="token-input" placeholder="Entrer le token..." onkeydown="if(event.key==='Enter') submitToken()">
    </div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-success" onclick="submitToken()">VALIDER</button>
      <button class="btn" onclick="hideAuthModal()">ANNULER</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container" aria-live="assertive"></div>

<script src="/static/app.js?v=6"></script>
</body>
</html>
