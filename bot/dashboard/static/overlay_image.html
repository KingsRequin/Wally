<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Wally Image Overlay</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: hidden; width: 100vw; height: 100vh; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 3vh; }
  #image-container { display: none; max-width: 90vw; max-height: 90vh; }

  .overlay-frame {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.1),
      0 12px 40px rgba(0, 0, 0, 0.6),
      0 0 80px rgba(6, 182, 212, 0.08);
  }

  #overlay-img {
    display: block;
    max-width: 88vw;
    max-height: 75vh;
    object-fit: contain;
  }

  #overlay-credit {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 24px 16px;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.75) 0%, rgba(0, 0, 0, 0.3) 60%, transparent 100%);
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  #overlay-credit .credit-label {
    font-size: 1.6rem;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.7);
  }

  #overlay-credit .credit-name {
    font-size: 2.4rem;
    font-weight: 800;
    color: #06b6d4;
    text-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
    letter-spacing: -0.02em;
  }
</style>
</head>
<body>
<div id="image-container">
  <div class="overlay-frame">
    <img id="overlay-img" src="" alt="">
    <div id="overlay-credit"></div>
  </div>
</div>
<script>
(function() {
  const container = document.getElementById('image-container');
  const img = document.getElementById('overlay-img');
  let hideTimeout = null;

  const sse = new EventSource('/api/public/sse/overlay-image');

  sse.addEventListener('show_image', function(e) {
    const data = JSON.parse(e.data);
    const animIn = data.animation_in || 'fadeIn';
    const animOut = data.animation_out || 'fadeOut';
    const duration = (data.display_duration || 15) * 1000;
    const animDuration = (data.animation_duration || 1) + 's';

    if (hideTimeout) { clearTimeout(hideTimeout); hideTimeout = null; }

    img.src = data.image_url;
    var credit = document.getElementById('overlay-credit');
    credit.textContent = '';
    if (data.username) {
      var label = document.createElement('span');
      label.className = 'credit-label';
      label.textContent = 'par';
      var name = document.createElement('span');
      name.className = 'credit-name';
      name.textContent = data.username;
      credit.appendChild(label);
      credit.appendChild(name);
    }
    container.style.display = 'block';
    container.style.setProperty('--animate-duration', animDuration);
    container.className = 'animate__animated animate__' + animIn;

    hideTimeout = setTimeout(function() {
      container.className = 'animate__animated animate__' + animOut;
      container.addEventListener('animationend', function handler() {
        container.style.display = 'none';
        container.className = '';
        img.src = '';
        container.removeEventListener('animationend', handler);
      });
    }, duration);
  });

  sse.onerror = function() {
    setTimeout(function() { location.reload(); }, 5000);
  };
})();
</script>
</body>
</html>
